[terminal]
# The VT to run the greeter on. Can be "next", "current" or a number
# designating the VT.
vt = 1

# The default session, also known as the greeter.
[default_session]
command = "tuigreetd --command sway-run"
user = "greeter"

# Automatic login
[initial_session]
command = "sway-run"
user = "zus"

